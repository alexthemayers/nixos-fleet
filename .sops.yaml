creation_rules:
  # ── Per-host secret files ─────────────────────────────────────────────────
  # Files placed in secrets/<hostname>/ can only be decrypted by the admin
  # and the specific host that needs them. This limits the blast radius of a
  # compromised host key to that one host's secrets.
  # To create a per-host file: sops secrets/<hostname>/secrets.yaml
  - path_regex: secrets/xcloud-postgres/.*\.yaml$
    key_groups:
      - age:
          - *alex
          - *xcloud_postgres

  - path_regex: secrets/xcloud-caddy/.*\.yaml$
    key_groups:
      - age:
          - *alex
          - *xcloud_caddy

  - path_regex: secrets/proxmox-applications-1/.*\.yaml$
    key_groups:
       - age:
           - *alex
           - *proxmox_applications_1

  - path_regex: secrets/proxmox-applications-2/.*\.yaml$
    key_groups:
      - age:
          - *alex
          - *proxmox_applications_2
          - 
  - path_regex: secrets/proxmox-observability-1/.*\.yaml$
    key_groups:
      - age:
          - *alex
          - *proxmox_observability_1

  - path_regex: secrets/proxmox-observability-2/.*\.yaml$
    key_groups:
      - age:
          - *alex
          - *proxmox_observability_2
  
  - path_regex: secrets/proxmox-dev/.*\.yaml$
    key_groups:
      - age:
          - *alex
          - *proxmox_dev

  - path_regex: secrets/proxmox-db-1/.*\.yaml$
    key_groups:
      - age:
          - *alex
          - *proxmox_db_1

  - path_regex: secrets/proxmox-db-2/.*\.yaml$
    key_groups:
      - age:
          - *alex
          - *proxmox_db_2

  - path_regex: secrets/rpi4/.*\.yaml$
    key_groups:
      - age:
          - *alex
          - *rpi4

  - path_regex: secrets/gaming/.*\.yaml$
    key_groups:
      - age:
          - *alex
          - *gaming

  - path_regex: secrets/proxmox-lb/.*\.yaml$
    key_groups:
      - age:
          - *alex
          - *proxmox_lb

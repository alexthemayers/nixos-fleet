stages:
  - test
  - build
  - deploy

variables:
  NIX_CONFIG: |
    experimental-features = nix-command flakes
    extra-platforms = x86_64-linux aarch64-linux
    min-free = 20G
    max-free = 50G
    build-users-group =
  NIXPKGS_ALLOW_UNFREE: "1"
  NIX_PATH: "$CI_PROJECT_DIR/.nix-defexpr"
  SSH_CONFIG: |
    # Fleet hosts — StrictHostKeyChecking disabled only for these known targets.
    # TODO: collect the fleet's SSH host public keys into a $SSH_KNOWN_HOSTS CI
    # masked variable, write them to ~/.ssh/known_hosts in before_script, and
    # change these blocks to StrictHostKeyChecking yes to eliminate MITM risk.
    Host proxmox-gitlab proxmox-observability proxmox-gaming proxmox-db proxmox-video xcloud-caddy xcloud-postgres gaming rpi4
      StrictHostKeyChecking no
      IdentityFile ~/.ssh/id_ed25519
      ControlMaster auto
      ControlPath ~/.ssh/ssh-%r@%h:%p
      ControlPersist 10m
    Host *
      StrictHostKeyChecking yes



default:
  image: nixos/nix:latest
  timeout: 24h

lint:
  stage: test
  script:
    - nix develop -c make lint

format:
  stage: test
  script:
    - nix fmt -- --ci

build:
  stage: build
  script:
    - nix develop -c make build

.deploy-template: &deploy-template
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - |
      echo "passwd: files" > /etc/nsswitch.conf
      echo "group: files" >> /etc/nsswitch.conf
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - tr -d '\r' < "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - echo "" >> ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - echo "$SSH_CONFIG" > ~/.ssh/config
  script:
    - nix develop -c deploy $NIX_FLAGS --targets "$TARGETS" --debug-logs --skip-checks

deploy-gaming:
  <<: *deploy-template
  environment:
    name: gaming
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  variables:
    TARGETS: ".#gaming"

deploy-proxmox-video:
  <<: *deploy-template
  environment:
    name: proxmox-video
  variables:
    TARGETS: ".#proxmox-video"

deploy-proxmox-gaming:
  <<: *deploy-template
  environment:
    name: proxmox-gaming
  variables:
    TARGETS: ".#proxmox-gaming"

deploy-proxmox-observability:
  <<: *deploy-template
  environment:
    name: proxmox-observability
  variables:
    TARGETS: ".#proxmox-observability"

deploy-proxmox-gitlab:
  <<: *deploy-template
  environment:
    name: proxmox-gitlab
  variables:
    TARGETS: ".#proxmox-gitlab"

deploy-proxmox-db:
  <<: *deploy-template
  environment:
    name: proxmox-db
  variables:
    TARGETS: ".#proxmox-db"

deploy-xcloud-caddy:
  <<: *deploy-template
  environment:
    name: xcloud-caddy
  variables:
    TARGETS: ".#xcloud-caddy"

deploy-xcloud-postgres:
  <<: *deploy-template
  environment:
    name: xcloud-postgres
  variables:
    TARGETS: ".#xcloud-postgres"

deploy-rpi4:
  <<: *deploy-template
  environment:
    name: rpi4
  variables:
    TARGETS: ".#rpi4"

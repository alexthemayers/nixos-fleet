stages:
  - test
  - build
  - deploy

variables:
  NIX_CONFIG: |
    experimental-features = nix-command flakes
    extra-platforms = x86_64-linux aarch64-linux
    min-free = 20G
    max-free = 50G
  NIXPKGS_ALLOW_UNFREE: "1"
  NIX_PATH: "$CI_PROJECT_DIR/.nix-defexpr"
  SSH_CONFIG: |
    # Fleet hosts — StrictHostKeyChecking disabled only for these known targets.
    # TODO: collect the fleet's SSH host public keys into a $SSH_KNOWN_HOSTS CI
    # masked variable, write them to ~/.ssh/known_hosts in before_script, and
    # change these blocks to StrictHostKeyChecking yes to eliminate MITM risk.
    Host proxmox-gitlab proxmox-observability-1 proxmox-gaming proxmox-db proxmox-video proxmox-dev xcloud-caddy xcloud-postgres gaming rpi4
      StrictHostKeyChecking no
      IdentityFile ~/.ssh/id_ed25519
      ControlMaster auto
      ControlPath ~/.ssh/ssh-%r@%h:%p
      ControlPersist 10m
    Host *
      StrictHostKeyChecking yes

.setup-nix: &setup-nix
  - apt-get update -yq && apt-get install -yq curl xz-utils git make openssh-client
  # Create nixbld group and explicitly add members to the group list in /etc/group
  - addgroup --system nixbld
  - for i in $(seq 1 10); do adduser --system --disabled-password --home /var/empty --gecos "Nix build user $i" nixbld$i; adduser nixbld$i nixbld; done
  - curl --proto '=https' --tlsv1.2 -sSf -L https://install.determinate.systems/nix | sh -s -- install linux --init none --no-confirm
  - export PATH="/nix/var/nix/profiles/default/bin:$PATH"
  # Start the Nix daemon in the background for multi-user mode
  - /nix/var/nix/profiles/default/bin/nix-daemon &
  # Wait briefly for the daemon socket to be ready
  - while [ ! -e /nix/var/nix/daemon-socket/socket ]; do sleep 0.5; done
  # Tell Nix clients to use the daemon
  - export NIX_REMOTE=daemon

default:
  image: debian:trixie-slim
  timeout: 24h
  before_script:
    - *setup-nix

lint:
  stage: test
  script:
    - nix develop -c make lint

format:
  stage: test
  script:
    - nix fmt -- --ci

build:
  stage: build
  script:
    - |
      if [ -n "${ATTIC_TOKEN:-}" ]; then
        nix develop -c attic login attic http://proxmox-lb:8080 "$ATTIC_TOKEN"
      fi
    - nix develop -c make build

.deploy-template: &deploy-template
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - *setup-nix
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - tr -d '\r' < "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - echo "" >> ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - echo "$SSH_CONFIG" > ~/.ssh/config
  script:
    - nix develop -c deploy $NIX_FLAGS --targets "$TARGETS" --debug-logs --skip-checks

deploy-gaming:
  <<: *deploy-template
  environment:
    name: gaming
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  variables:
    TARGETS: ".#gaming"

deploy-proxmox-applications-1:
  <<: *deploy-template
  environment:
    name: proxmox-applications-1
  variables:
    TARGETS: ".#proxmox-applications-1"

deploy-proxmox-applications-2:
